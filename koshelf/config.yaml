name: "KoShelf"
description: "Transform your KOReader library into a beautiful reading dashboard with statistics."
version: "2026.4.0"
slug: "koshelf"
init: false
arch:
  - amd64
  - aarch64
startup: services
map:
  - media:rw
  - share:rw
ports:
  38492/tcp: 38492
options:
  title: ""
  include_unread: true
  include_all_stats: false
  library_path: []
  books_path: ""
  database_path: ""
  docsettings_path: ""
  hashdocsettings_path: ""
  heatmap_scale_max: "auto"
  day_start_time: ""
  timezone: ""
  min_pages_per_day: ""
  min_time_per_day: "30s"
  language: "en_US"
  enable_auth: false
  reset_password: false
  trusted_proxies:
    - "172.30.32.0/23"
  enable_writeback: false
  ignore_stable_page_metadata: false
  debug_log: false
schema:
  title: str?
  library_path:
    - str
  books_path: str?
  database_path: str?
  docsettings_path: str?
  hashdocsettings_path: str?
  include_unread: bool
  include_all_stats: bool
  heatmap_scale_max: str?
  day_start_time: str?
  timezone: str?
  min_pages_per_day: str?
  min_time_per_day: str?
  language: str?
  enable_auth: bool
  reset_password: bool
  trusted_proxies:
    - str
  enable_writeback: bool
  ignore_stable_page_metadata: bool
  debug_log: bool